<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de Notas - Anatomia</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #172033;
      --muted: #667085;
      --line: #d8dee9;
      --primary: #155eef;
      --primary-dark: #0f49bd;
      --ok: #087443;
      --warn: #b54708;
      --bad: #b42318;
      --soft-blue: #eaf1ff;
      --soft-green: #e9f8ef;
      --soft-warn: #fff4e5;
      --soft-bad: #fdecec;
      --shadow: 0 18px 50px rgba(23, 32, 51, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(21, 94, 239, 0.12), transparent 32rem),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0;
    }

    .header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 3vw, 2.8rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      max-width: 680px;
      line-height: 1.5;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(300px, 420px) 1fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .form-panel {
      padding: 18px;
      position: sticky;
      top: 16px;
    }

    .panel-title {
      margin: 0 0 14px;
      font-size: 1.08rem;
    }

    .field-grid {
      display: grid;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 7px;
      font-weight: 700;
      font-size: 0.94rem;
    }

    .hint {
      color: var(--muted);
      font-weight: 400;
      font-size: 0.84rem;
      line-height: 1.35;
    }

    input {
      width: 100%;
      min-height: 44px;
      border: 1px solid #c9d2e3;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 1rem;
      color: var(--text);
      background: #fff;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(21, 94, 239, 0.12);
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      border: 0;
      border-radius: 8px;
      min-height: 42px;
      padding: 0 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary-btn {
      background: var(--primary);
      color: white;
      flex: 1;
    }

    .primary-btn:hover {
      background: var(--primary-dark);
    }

    .ghost-btn {
      background: #edf2f7;
      color: var(--text);
    }

    .results {
      display: grid;
      gap: 14px;
    }

    .status-card {
      padding: 18px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .status-card.good {
      border-color: #9bd8b8;
      background: var(--soft-green);
    }

    .status-card.warn {
      border-color: #f7c475;
      background: var(--soft-warn);
    }

    .status-card.bad {
      border-color: #f4aaa5;
      background: var(--soft-bad);
    }

    .status-card.info {
      border-color: #b8ccff;
      background: var(--soft-blue);
    }

    .status-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 8px;
    }

    .status-label {
      margin: 0;
      font-size: 0.86rem;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .big-number {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.4rem);
      font-weight: 800;
      line-height: 1;
    }

    .status-text {
      margin: 0;
      color: var(--text);
      line-height: 1.45;
    }

    .cards-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .mini-card {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
    }

    .mini-card strong {
      display: block;
      font-size: 1.4rem;
      margin-top: 6px;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 620px;
    }

    th,
    td {
      padding: 12px 14px;
      text-align: left;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }

    th {
      background: #f2f5fa;
      font-size: 0.86rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: #344054;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      border-radius: 999px;
      padding: 4px 10px;
      font-weight: 700;
      font-size: 0.82rem;
      white-space: nowrap;
    }

    .tag.ok {
      background: #dcfae6;
      color: var(--ok);
    }

    .tag.warn {
      background: #fff0d5;
      color: var(--warn);
    }

    .tag.bad {
      background: #fee4e2;
      color: var(--bad);
    }

    .formula {
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      background: #f8fafc;
      border: 1px solid var(--line);
      color: #475467;
      line-height: 1.45;
      font-size: 0.92rem;
    }

    .error {
      display: none;
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      background: var(--soft-bad);
      color: var(--bad);
      font-weight: 700;
      line-height: 1.4;
    }

    @media (max-width: 860px) {
      main {
        width: min(100% - 24px, 680px);
        padding: 22px 0;
      }

      .header {
        display: block;
      }

      .layout,
      .cards-row {
        grid-template-columns: 1fr;
      }

      .form-panel {
        position: static;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="header">
      <div>
        <h1>Calculadora de Anatomia</h1>
        <p class="subtitle">
          Coloque as notas que voce ja tem. A pratica entra como Parcial 3 com peso 2,
          e o recuperatorio substitui apenas a menor nota entre Parcial 1 e Parcial 2.
        </p>
      </div>
    </section>

    <section class="layout">
      <form class="panel form-panel" id="gradeForm">
        <h2 class="panel-title">Suas notas</h2>
        <div class="field-grid">
          <label>
            Parcial 1
            <input id="p1" type="number" inputmode="decimal" min="0" max="100" step="0.01" placeholder="0 a 100" />
          </label>

          <label>
            Parcial 2
            <input id="p2" type="number" inputmode="decimal" min="0" max="100" step="0.01" placeholder="0 a 100" />
          </label>

          <label>
            Parcial 3 - pratica
            <span class="hint">Esta nota tem peso 2 na media das parciais.</span>
            <input id="p3" type="number" inputmode="decimal" min="0" max="100" step="0.01" placeholder="0 a 100" />
          </label>

          <label>
            Recuperatorio
            <span class="hint">Opcional. Substitui a menor entre P1 e P2; nao substitui a pratica.</span>
            <input id="rec" type="number" inputmode="decimal" min="0" max="100" step="0.01" placeholder="0 a 100" />
          </label>
        </div>

        <div class="actions">
          <button class="primary-btn" type="submit">Calcular</button>
          <button class="ghost-btn" type="button" id="clearBtn">Limpar</button>
        </div>

        <div class="error" id="errorBox"></div>

        <div class="formula">
          <strong>Formula das parciais:</strong><br />
          (P1 + P2 + 2 x P3) / 4. Para fazer a final, essa media precisa ser pelo menos 60.
        </div>
      </form>

      <section class="results" id="results" aria-live="polite"></section>
    </section>
  </main>

  <script>
    const form = document.getElementById("gradeForm");
    const results = document.getElementById("results");
    const errorBox = document.getElementById("errorBox");
    const clearBtn = document.getElementById("clearBtn");
    const inputs = ["p1", "p2", "p3", "rec"].map((id) => document.getElementById(id));

    const INDEXES = [
      { indice: 5, faixa: "90 a 100", minimo: 90 },
      { indice: 4, faixa: "80 a 89", minimo: 80 },
      { indice: 3, faixa: "70 a 79", minimo: 70 },
      { indice: 2, faixa: "60 a 69", minimo: 60 }
    ];

    function readGrade(id) {
      const raw = document.getElementById(id).value.trim().replace(",", ".");
      if (raw === "") return null;
      const value = Number(raw);
      return Number.isFinite(value) ? value : NaN;
    }

    function format(value) {
      if (!Number.isFinite(value)) return "-";
      return value.toLocaleString("pt-BR", {
        minimumFractionDigits: value % 1 === 0 ? 0 : 2,
        maximumFractionDigits: 2
      });
    }

    function clampGrade(value) {
      if (value < 0) return 0;
      if (value > 100) return 100;
      return value;
    }

    function validate(grades) {
      const invalid = Object.entries(grades)
        .filter(([, value]) => value !== null && (Number.isNaN(value) || value < 0 || value > 100))
        .map(([key]) => key.toUpperCase());

      if (invalid.length) {
        return `Verifique ${invalid.join(", ")}. Todas as notas precisam estar entre 0 e 100.`;
      }
      return "";
    }

    function partialAverage(p1, p2, p3) {
      return (p1 + p2 + 2 * p3) / 4;
    }

    function averageWithRecovery(p1, p2, p3, rec) {
      if (rec === null) return partialAverage(p1, p2, p3);
      if (p1 <= p2) return partialAverage(rec, p2, p3);
      return partialAverage(p1, rec, p3);
    }

    function recoveryTarget(p1, p2, p3) {
      if (p1 <= p2) {
        return {
          replaces: "Parcial 1",
          needed: 240 - p2 - 2 * p3
        };
      }
      return {
        replaces: "Parcial 2",
        needed: 240 - p1 - 2 * p3
      };
    }

    function enteredPartialProgress(grades) {
      const items = [
        { key: "p1", label: "Parcial 1", weight: 1, value: grades.p1 },
        { key: "p2", label: "Parcial 2", weight: 1, value: grades.p2 },
        { key: "p3", label: "Parcial 3", weight: 2, value: grades.p3 }
      ];
      const known = items.filter((item) => item.value !== null);
      const missing = items.filter((item) => item.value === null);
      const knownPoints = known.reduce((sum, item) => sum + item.value * item.weight, 0);
      const missingWeight = missing.reduce((sum, item) => sum + item.weight, 0);
      const neededWeightedPoints = 240 - knownPoints;

      return { known, missing, knownPoints, missingWeight, neededWeightedPoints };
    }

    function card(kind, label, number, text) {
      return `
        <article class="status-card ${kind}">
          <div class="status-top">
            <p class="status-label">${label}</p>
          </div>
          ${number !== null ? `<p class="big-number">${number}</p>` : ""}
          <p class="status-text">${text}</p>
        </article>
      `;
    }

    function renderMissing(grades) {
      const progress = enteredPartialProgress(grades);
      const missingNames = progress.missing.map((item) => item.label).join(", ");

      if (progress.known.length === 0) {
        return card(
          "info",
          "Comece preenchendo",
          null,
          "Preencha pelo menos uma parcial para simular quanto ainda precisa para chegar aos 60% exigidos antes da final."
        );
      }

      if (progress.neededWeightedPoints <= 0) {
        return card(
          "good",
          "Parciais em andamento",
          null,
          `Mesmo com as notas restantes zeradas, voce ja teria media parcial suficiente para habilitar a final. Ainda faltam: ${missingNames}.`
        );
      }

      const neededAverage = progress.neededWeightedPoints / progress.missingWeight;
      let kind = "info";
      let message = `Falta preencher: ${missingNames}. Para chegar a media 60 nas parciais, voce precisa tirar media ponderada de ${format(neededAverage)} nas notas que faltam.`;

      if (neededAverage > 100) {
        kind = "bad";
        message = `Mesmo tirando 100 nas notas que faltam (${missingNames}), nao seria possivel chegar a media 60 sem recuperatorio.`;
      } else if (neededAverage > 80) {
        kind = "warn";
      }

      return card(kind, "Quanto falta para habilitar a final", null, message);
    }

    function finalRequirement(mediaParcial) {
      const rows = INDEXES.map((item) => {
        const rawNeeded = (item.minimo - 0.6 * mediaParcial) / 0.4;
        const possible = rawNeeded <= 100;
        const already = rawNeeded <= 0;
        const neededText = possible ? format(clampGrade(rawNeeded)) : "Impossivel";
        const status = possible
          ? `<span class="tag ${already ? "ok" : "warn"}">${already ? "Ja alcanca" : "Possivel"}</span>`
          : `<span class="tag bad">Nao alcanca</span>`;

        return `
          <tr>
            <td><strong>Indice ${item.indice}</strong></td>
            <td>${item.faixa}</td>
            <td>${neededText}</td>
            <td>${status}</td>
          </tr>
        `;
      }).join("");

      const maxTotal = 0.6 * mediaParcial + 40;
      const minTotal = 0.6 * mediaParcial;

      return `
        <article class="status-card">
          <h2 class="panel-title">Quanto precisa na prova final</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Indice desejado</th>
                  <th>Promedio total</th>
                  <th>Nota minima na final</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
          <div class="formula">
            <strong>Formula total:</strong> promedio final = media das parciais x 0,6 + prova final x 0,4.
            Com sua media parcial atual, seu total ficaria entre ${format(minTotal)} e ${format(maxTotal)}, dependendo da final.
          </div>
        </article>
      `;
    }

    function renderComplete(grades) {
      const baseAverage = partialAverage(grades.p1, grades.p2, grades.p3);
      const finalAverage = averageWithRecovery(grades.p1, grades.p2, grades.p3, grades.rec);
      const usedRecovery = grades.rec !== null;
      const canDoFinal = finalAverage >= 60;
      const recInfo = recoveryTarget(grades.p1, grades.p2, grades.p3);

      let statusKind = canDoFinal ? "good" : "bad";
      let statusText = canDoFinal
        ? "Voce esta habilitado para fazer a prova final."
        : "Voce ainda nao alcancou 60 de media nas parciais. Neste caso, precisa de recuperatorio.";

      if (!canDoFinal) {
        if (recInfo.needed > 100) {
          statusText += ` Mesmo com 100 no recuperatorio, nao alcanca 60 porque a Parcial 3 nao pode ser substituida.`;
        } else {
          statusText += ` Para habilitar a final, precisa tirar pelo menos ${format(clampGrade(recInfo.needed))} no recuperatorio, substituindo ${recInfo.replaces}.`;
        }
      }

      const recoveryText = usedRecovery
        ? `Recuperatorio aplicado no lugar da menor entre P1 e P2. Media original: ${format(baseAverage)}.`
        : `Sem recuperatorio aplicado. Se precisar, ele substituiria ${recInfo.replaces}.`;

      return `
        <article class="status-card ${statusKind}">
          <div class="status-top">
            <p class="status-label">Media das parciais</p>
          </div>
          <p class="big-number">${format(finalAverage)}</p>
          <p class="status-text">${statusText}</p>
        </article>

        <div class="cards-row">
          <div class="mini-card">
            <span class="hint">Media sem recuperatorio</span>
            <strong>${format(baseAverage)}</strong>
          </div>
          <div class="mini-card">
            <span class="hint">Media usada no total</span>
            <strong>${format(finalAverage)}</strong>
          </div>
          <div class="mini-card">
            <span class="hint">Situacao</span>
            <strong>${canDoFinal ? "Final" : "Recup."}</strong>
          </div>
        </div>

        ${card("info", "Recuperatorio", null, recoveryText)}
        ${canDoFinal ? finalRequirement(finalAverage) : ""}
      `;
    }

    function calculate(event) {
      if (event) event.preventDefault();

      const grades = {
        p1: readGrade("p1"),
        p2: readGrade("p2"),
        p3: readGrade("p3"),
        rec: readGrade("rec")
      };

      const error = validate(grades);
      if (error) {
        errorBox.textContent = error;
        errorBox.style.display = "block";
        results.innerHTML = "";
        return;
      }

      errorBox.style.display = "none";

      const allPartials = grades.p1 !== null && grades.p2 !== null && grades.p3 !== null;
      results.innerHTML = allPartials ? renderComplete(grades) : renderMissing(grades);
    }

    form.addEventListener("submit", calculate);
    inputs.forEach((input) => input.addEventListener("input", calculate));

    clearBtn.addEventListener("click", () => {
      inputs.forEach((input) => {
        input.value = "";
      });
      errorBox.style.display = "none";
      calculate();
    });

    calculate();
  </script>
</body>
</html>
